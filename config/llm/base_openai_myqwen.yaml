# config/llm/base.yaml
provider_class: "MiroThinkerVLLMClient"
model_name: Qwen3-32B-Q4
api_key: ${oc.env:OPENAI_API_KEY,empty}
base_url: ${oc.env:OPENAI_BASE_URL,http://localhost:43210/v1}

temperature: 1.0
top_p: 1.0
min_p: 0.0
top_k: -1
# 这个max_tokens似乎没有用，或被应用层的agent_quickstart.yaml 覆盖了
# max_tokens 单次回答输出的最大长度
max_tokens: 16384
max_context_length: 40960
async_client: true

reasoning_effort: null
repetition_penalty: 1.0

disable_cache_control: true
keep_tool_result: -1

use_tool_calls: false
oai_tool_thinking: false
